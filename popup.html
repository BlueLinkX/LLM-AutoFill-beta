<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLM 自动填表</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="topbar">
        <div>
          <h1>LLM 自动填表</h1>
          <p id="setupState">检查配置中...</p>
        </div>
        <div class="header-buttons">
          <button id="openLogs" class="icon-button" title="日志">≡</button>
          <button id="openProfile" class="icon-button" title="配置">⚙</button>
        </div>
      </header>

      <section class="actions">
        <button id="scanPage" class="secondary">扫描字段</button>
        <button id="generatePlan" class="primary">生成填表方案</button>
      </section>

      <div id="status" class="status">打开一个包含表单的网页后开始。</div>

      <section class="summary">
        <div>
          <span class="metric" id="fieldCount">0</span>
          <span>字段</span>
        </div>
        <div>
          <span class="metric" id="actionCount">0</span>
          <span>建议</span>
        </div>
      </section>

      <section id="usageSection" class="usage hidden">
        <span>Token 用量</span>
        <strong id="usageText">-</strong>
      </section>

      <section id="notesSection" class="notes hidden">
        <h2>备注</h2>
        <ul id="notes"></ul>
      </section>

      <section id="previewSection" class="preview hidden">
        <div class="section-title">
          <h2>填入预览</h2>
          <button id="selectHighConfidence" class="text-button">只选高置信</button>
        </div>
        <div id="previewList" class="preview-list"></div>
        <button id="applyPlan" class="primary wide">填入选中字段</button>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
