<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLM Smart Autofill</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="topbar">
        <div>
          <h1 id="appTitle">LLM Smart Autofill</h1>
          <p id="setupState">Checking configuration...</p>
        </div>
        <div class="header-buttons">
          <button id="openLogs" class="icon-button" title="Logs">≡</button>
          <button id="openProfile" class="icon-button" title="Settings">⚙</button>
        </div>
      </header>

      <section class="quick-action">
        <button id="quickAutofill" class="primary wide top-action">One-click Autofill</button>
      </section>

      <section class="actions">
        <button id="scanPage" class="secondary">Scan Fields</button>
        <button id="generatePlan" class="primary">Generate Fill Plan</button>
      </section>

      <div id="status" class="status">Open a page with a form to begin.</div>

      <section class="summary">
        <div>
          <span class="metric" id="fieldCount">0</span>
          <span id="fieldsLabel">Fields</span>
        </div>
        <div>
          <span class="metric" id="actionCount">0</span>
          <span id="suggestionsLabel">Suggestions</span>
        </div>
      </section>

      <section id="usageSection" class="usage hidden">
        <span id="usageLabel">Token usage</span>
        <strong id="usageText">-</strong>
      </section>

      <section id="notesSection" class="notes hidden">
        <h2 id="notesTitle">Notes</h2>
        <ul id="notes"></ul>
      </section>

      <section id="previewSection" class="preview hidden">
        <div class="section-title">
          <h2 id="previewTitle">Fill Preview</h2>
          <button id="selectHighConfidence" class="text-button">High confidence only</button>
        </div>
        <div id="previewList" class="preview-list"></div>
        <button id="applyPlan" class="primary wide">Fill Selected Fields</button>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
