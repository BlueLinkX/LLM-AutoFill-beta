<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLM 自动填表配置</title>
    <link rel="stylesheet" href="profile.css">
  </head>
  <body>
    <main class="page">
      <header>
        <h1>LLM 自动填表配置</h1>
        <p>资料会保存在 Chrome 本地扩展存储中，生成填表方案时发送给 OpenAI API。</p>
      </header>

      <form id="settingsForm">
        <section>
          <h2>模型与 API</h2>
          <div class="grid two">
            <label>
              <span>OpenAI API Key</span>
              <input id="apiKey" type="password" autocomplete="off" placeholder="sk-...">
            </label>
            <label>
              <span>模型</span>
              <input id="model" type="text" placeholder="gpt-5.4">
            </label>
            <label>
              <span>推理强度</span>
              <select id="reasoningEffort">
                <option value="low">low</option>
                <option value="medium">medium</option>
                <option value="high">high</option>
                <option value="xhigh">xhigh</option>
              </select>
            </label>
          </div>
          <label class="checkbox">
            <input id="includeScreenshot" type="checkbox">
            <span>生成方案时包含页面截图和字段编号</span>
          </label>
        </section>

        <section>
          <h2>常用个人信息</h2>
          <div class="grid two">
            <label><span>姓名（英文）</span><input id="fullNameEnglish" type="text"></label>
            <label><span>姓名（中文）</span><input id="fullNameChinese" type="text"></label>
            <label><span>姓名（ひらがな）</span><input id="fullNameHiragana" type="text"></label>
            <label><span>姓名（カタカナ）</span><input id="fullNameKatakana" type="text"></label>
            <label><span>通用姓名字段</span><input id="fullName" type="text"></label>
            <label><span>出生日期</span><input id="birthDate" type="text"></label>
            <label><span>性别</span><input id="gender" type="text"></label>
            <label><span>国籍</span><input id="nationality" type="text"></label>
            <label><span>居住地</span><input id="residence" type="text"></label>
            <label><span>邮箱</span><input id="email" type="email"></label>
            <label><span>邮箱（个人）</span><input id="personalEmail" type="email"></label>
            <label><span>邮箱（学校）</span><input id="schoolEmail" type="email"></label>
            <label><span>电话</span><input id="phone" type="tel"></label>
            <label><span>当前城市</span><input id="city" type="text"></label>
            <label><span>国家/地区</span><input id="country" type="text"></label>
            <label><span>邮编</span><input id="postalCode" type="text"></label>
          </div>
          <label>
            <span>详细地址</span>
            <textarea id="address" rows="2"></textarea>
          </label>
        </section>

        <section>
          <h2>求职信息</h2>
          <div class="grid two">
            <label><span>目标职位</span><input id="targetRole" type="text"></label>
            <label><span>可入职时间</span><input id="availability" type="text"></label>
            <label><span>期望工作地点</span><input id="preferredLocation" type="text"></label>
            <label><span>签证/工作许可</span><input id="workAuthorization" type="text"></label>
          </div>
          <label>
            <span>教育经历</span>
            <textarea id="education" rows="4"></textarea>
          </label>
          <label>
            <span>工作经历</span>
            <textarea id="workExperience" rows="6"></textarea>
          </label>
          <label>
            <span>技能</span>
            <textarea id="skills" rows="3"></textarea>
          </label>
          <label>
            <span>简历全文 / 补充资料</span>
            <textarea id="resumeText" rows="10"></textarea>
          </label>
        </section>

        <footer>
          <button type="button" id="loadDefaultProfile" class="secondary">载入我的资料</button>
          <button type="submit" class="primary">保存配置</button>
          <span id="saveState"></span>
        </footer>
      </form>
    </main>

    <script type="module" src="profile.js"></script>
  </body>
</html>
