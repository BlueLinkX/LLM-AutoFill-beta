<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Autofill Logs</title>
    <link rel="stylesheet" href="logs.css">
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1 id="logsTitle">Autofill Logs</h1>
          <p id="logsDescription">Logs are stored only in Chrome local extension storage.</p>
        </div>
        <div class="actions">
          <button id="exportLogs" class="secondary">Export JSON</button>
          <button id="clearLogs" class="danger">Clear Logs</button>
        </div>
      </header>
      <section id="logList" class="log-list"></section>
    </main>
    <script type="module" src="logs.js"></script>
  </body>
</html>
